
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Institutional Trading Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta http-equiv="refresh" content="3600">
  <style>
    :root {
      --bg: #081326;
      --panel: #0e1b34;
      --panel2: #142342;
      --border: #213a68;
      --text: #edf3ff;
      --muted: #9eb3d3;
      --green: #26d07c;
      --red: #ff5f5f;
      --amber: #ffc857;
      --blue: #4da3ff;
      --purple: #a16eff;
      --slate: #7d8faa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid var(--border); background:#081831; }
    .title { font-size:18px; font-weight:700; }
    .subtle { color: var(--muted); font-size:12px; }
    .tabs { display:flex; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .tab { padding:8px 16px; border:1px solid var(--border); border-radius:10px; background:var(--panel); color:var(--muted); cursor:pointer; }
    .tab.active { color:var(--text); border-color:#3e8fff; background:#13284d; }
    .page { padding:18px; }
    .grid { display:grid; grid-template-columns: 430px 1fr; gap:18px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:16px; }
    .card-title { font-size:14px; font-weight:700; margin-bottom:14px; }
    .symbol-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
    .symbol-head h2 { margin:0; font-size:24px; }
    .price { font-size:28px; font-weight:700; text-align:right; }
    .headline-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .mini-box { background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:10px 12px; }
    .label { font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    .value { font-size:15px; font-weight:700; }
    .badge { display:inline-block; padding:5px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .green { background:rgba(38,208,124,0.12); color:var(--green); }
    .red { background:rgba(255,95,95,0.12); color:var(--red); }
    .amber { background:rgba(255,200,87,0.12); color:var(--amber); }
    .blue { background:rgba(77,163,255,0.12); color:var(--blue); }
    .purple { background:rgba(161,110,255,0.12); color:var(--purple); }
    .slate { background:rgba(125,143,170,0.12); color:var(--slate); }
    .section-title { margin:18px 0 10px; color:var(--muted); font-size:12px; text-transform:uppercase; font-weight:700; letter-spacing:0.6px; }
    .condition-list { display:flex; flex-direction:column; gap:8px; }
    .condition-row { display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); background:var(--panel2); border-radius:12px; padding:10px 12px; }
    .condition-name { font-size:13px; }
    .condition-state { font-size:12px; font-weight:700; }
    .state-yes { color:var(--green); }
    .state-no { color:var(--red); }
    .state-wait { color:var(--amber); }
    .blocker { margin-top:14px; padding:12px; border-radius:12px; background:rgba(255,200,87,0.08); border:1px solid rgba(255,200,87,0.22); }
    .blocker strong { display:block; margin-bottom:6px; color:var(--amber); }
    .graph-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .graph-strip { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .metric-pill { background:var(--panel2); border:1px solid var(--border); padding:8px 10px; border-radius:10px; font-size:12px; color:var(--muted); }
    .metric-pill strong { color:var(--text); }
    .chart-wrap { height: 520px; background:#07142b; border:1px solid var(--border); border-radius:14px; padding:10px; }
    .empty { padding:40px; color:var(--muted); }
    @media (max-width: 1050px) { .grid { grid-template-columns: 1fr; } .chart-wrap { height:360px; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Institutional Trading Dashboard</div>
    <div class="subtle">Auto refresh: 3600s</div>
  </div>
  <div class="tabs"></div>
  <div class="page"><div class='empty'>No processed symbol files found.</div></div>
  <script>
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => { x.classList.remove('active'); x.style.display='none'; });
        tab.classList.add('active');
        const id = tab.getAttribute('data-tab');
        const panel = document.getElementById(id);
        if (panel) { panel.classList.add('active'); panel.style.display='block'; }
      });
    });

    function renderChart(symbol) {
      const canvas = document.getElementById('chart-' + symbol);
      const dataNode = document.getElementById('data-' + symbol);
      if (!canvas || !dataNode) return;
      const payload = JSON.parse(dataNode.textContent);
      const ctx = canvas.getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: payload.labels || [],
          datasets: [
            { label: 'Price', data: payload.price || [], borderColor: '#eaf2ff', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.2 },
            { label: 'Pivot', data: payload.pivot || [], borderColor: '#ffc857', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, tension: 0 },
            { label: 'EMA10', data: payload.ema10 || [], borderColor: '#26d07c', backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
            { label: 'EMA20', data: payload.ema20 || [], borderColor: '#4da3ff', backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
            { label: 'EMA50', data: payload.ema50 || [], borderColor: '#a16eff', backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 0, tension: 0.2 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { labels: { color: '#d7e5ff' } } },
          scales: {
            x: { ticks: { color: '#9eb3d3', maxTicksLimit: 10 }, grid: { color: 'rgba(158,179,211,0.08)' } },
            y: { ticks: { color: '#9eb3d3' }, grid: { color: 'rgba(158,179,211,0.08)' } }
          }
        }
      });
    }

    
  </script>
</body>
</html>
